$kind: http-request
name: Get All Orders
description: "Documentation can be found in the simple-books-api-collection
  repo's README.md file:
  [https://github.com/gisbey/simple-books-api-collection/blob/main/README.md#ge\
  t-orders--get-all-orders](https://github.com/gisbey/simple-books-api-collecti\
  on/blob/main/README.md#get-orders--get-all-orders)"
url: "{{baseUrl}}/orders"
method: GET
body:
  type: json
  content: ""
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: "//
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Config\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      const MAX_RESPONSE_TIME_MS = 500;\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // HTTP Validation\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Status code is 200', () => {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test('Response time satisfactory', () => {\r

      \    pm.expect(pm.response.responseTime, 'Response too slow')\r

      \        .to.be.below(MAX_RESPONSE_TIME_MS);\r

      });\r

      \r

      pm.test('Content-Type is JSON', () => {\r

      \    const contentType = pm.response.headers.get('Content-Type');\r

      \    \r

      \    pm.expect(contentType, 'Missing Content-Type header').to.exist;\r

      \    pm.expect(contentType.toLowerCase(), 'Content-Type must include
      application/json')\r

      \        .to.include('application/json');\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Parse Response\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      let response;\r

      \r

      pm.test('Response is valid JSON', () => {\r

      \    pm.expect(pm.response.text(), 'Response body must not be empty')\r

      \        .to.not.be.empty;\r

      \    \r

      \    response = pm.response.json();\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Schema Validation\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Schema is valid', () => {\r

      \r

      \    const schema = {\r

      \        type: 'array',\r

      \        items: {\r

      \            type: 'object',\r

      \            properties: {\r

      \                id: {\r

      \                    type: 'string',\r

      \                    pattern: '^[A-Za-z0-9-_]{21}$'\r

      \                },\r

      \                bookId: {\r

      \                    type: 'integer',\r

      \                },\r

      \                customerName: {\r

      \                    type: 'string',\r

      \                    pattern: \"^[A-Za-z.' ]+$\"\r

      \                },\r

      \                quantity: {\r

      \                    type: 'integer'\r

      \                },\r

      \                timestamp: {\r

      \                    type: 'integer'\r

      \                }\r

      \            },\r

      \            required: ['id', 'bookId', 'customerName', 'quantity',
      'timestamp'],\r

      \            additionalProperties: false\r

      \        }\r

      \    };\r

      \r

      \    pm.response.to.have.jsonSchema(schema);\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Order Lookup\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      const orderId = pm.collectionVariables.get(\"orderId\");\r

      \r

      const order = Array.isArray(response) ? response.find(o => o.id ===
      orderId) : response;\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Business Logic Tests\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Order present', function () {\r

      \    pm.expect(order.id, 'Order ID must match \"orderId\" collection
      variable')\r

      \        .to.eql(orderId);\r

      \    \r

      \    pm.expect(order.bookId, 'Book ID must match \"bookId\" collection
      varibale')\r

      \        .to.eql(pm.collectionVariables.get(\"bookId\"));\r

      \    \r

      \    pm.expect(order.quantity, 'Quantity should equal 1')\r

      \        .to.eql(1);\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Export Variables\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.collectionVariables.set(\"customerName\", order.customerName);\r\n"
    language: text/javascript
order: 6000
