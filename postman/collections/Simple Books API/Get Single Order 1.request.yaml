$kind: http-request
name: Get Single Order
description: "Documentation can be found in the simple-books-api-collection
  repo's README.md file:
  [https://github.com/gisbey/simple-books-api-collection/blob/main/README.md#ge\
  t-ordersorderid--get-single-order](https://github.com/gisbey/simple-books-api\
  -collection/blob/main/README.md#get-ordersorderid--get-single-order)"
url: "{{baseUrl}}/orders/:orderId"
method: GET
pathVariables:
  orderId: "{{orderId}}"
body:
  type: json
  content: ""
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: "//
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Config\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      const MAX_RESPONSE_TIME_MS = 500;\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // HTTP Validation\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Status code is 200', () => {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test('Response time satisfactory', () => {\r

      \    pm.expect(pm.response.responseTime, 'Response too slow')\r

      \        .to.be.below(MAX_RESPONSE_TIME_MS);\r

      });\r

      \r

      pm.test('Content-Type is JSON', () => {\r

      \    const contentType = pm.response.headers.get('Content-Type');\r

      \    \r

      \    pm.expect(contentType, 'Missing Content-Type header').to.exist;\r

      \    pm.expect(contentType.toLowerCase(), 'Content-Type must include
      application/json')\r

      \        .to.include('application/json');\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Parse Response\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      let response;\r

      \r

      pm.test('Response is valid JSON', () => {\r

      \    pm.expect(pm.response.text(), 'Response body must not be empty')\r

      \        .to.not.be.empty;\r

      \    \r

      \    response = pm.response.json();\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Schema Validation\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Schema is valid', () => {\r

      \r

      \    const schema = {\r

      \        type: 'object',\r

      \        properties: {\r

      \            id: {\r

      \                type: 'integer',\r

      \            },\r

      \            entityType: {\r

      \                type: 'string',\r

      \                pattern: '^[A-Z]{4}$'\r

      \            },\r

      \            available: {\r

      \                type: 'boolean',\r

      \            },\r

      \            timestamp: {\r

      \                type: 'integer',\r

      \            },\r

      \            created: {\r

      \                type: 'string',\r

      \                format: 'date-time'\r

      \            },\r

      \            isbn: {\r

      \                type: 'string',\r

      \                minLength: 10,\r

      \                maxLength: 10\r

      \            },\r

      \            GSI1SK: {\r

      \                type: 'string',\r

      \                pattern: '^[A-Z0-9#]{6}$'\r

      \            },\r

      \            name: {\r

      \                type: 'string',\r

      \                pattern: '^[A-Za-z ]+$'\r

      \            },\r

      \            'current-stock': {\r

      \                type: 'integer',\r

      \            },\r

      \            GSI1PK: {\r

      \                type: 'string',\r

      \                pattern: '^[A-Za-z#]+$'\r

      \            },\r

      \            price: {\r

      \                type: 'number'\r

      \            },\r

      \            PK: {\r

      \                type: 'string',\r

      \                pattern: '^[A-Z0-9#]{6}$'\r

      \            },\r

      \            author: {\r

      \                type: 'string',\r

      \                pattern: '^[A-Za-z. ]+$'\r

      \            },\r

      \            type: {\r

      \                type: 'string',\r

      \                pattern: '^[a-z-]+$'\r

      \            },\r

      \            SK: {\r

      \                type: 'string',\r

      \                pattern: '^[A-Z]{8}$'\r

      \            },\r

      \            \r

      \        },\r

      \        required: ['id', 'entityType', 'available', 'timestamp',
      'created', 'GSI1SK', 'name', 'current-stock', 'GSI1PK', 'price', 'PK',
      'author', 'type', 'SK']\r

      \    };\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Business Logic Tests\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test(\"Order details remain correct, but customer name has changed\",
      () => {\r

      \    pm.expect(response.id, 'Order ID must match \"orderId\" collection
      variable')\r

      \        .to.be.eql(pm.collectionVariables.get(\"orderId\"));\r

      \    \r

      \    pm.expect(response.bookId, 'Book ID must match \"bookId\" collection
      variable')\r

      \        .to.be.eql(parseInt(pm.collectionVariables.get(\"bookId\")));\r

      \    \r

      \    pm.expect(response.customerName, 'Customer name must not match
      \"customerName\" collection variable')\r

      \        .to.not.eql(pm.collectionVariables.get(\"customerName\"));\r

      \    \r

      \    pm.expect(response.quantity, 'Quantity should equal 1')\r

      \        .to.eql(1);\r

      });\r\n"
    language: text/javascript
order: 9000
