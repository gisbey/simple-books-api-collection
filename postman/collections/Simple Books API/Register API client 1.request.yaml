$kind: http-request
name: Register API client
description: "Documentation can be found in the simple-books-api-collection
  repo's README.md file:
  [https://github.com/gisbey/simple-books-api-collection/blob/main/README.md#ap\
  i-clients](https://github.com/gisbey/simple-books-api-collection/blob/main/RE\
  ADME.md#api-clients)"
url: "{{baseUrl}}/api-clients"
method: POST
body:
  type: json
  content: "{\r

    \   \"clientName\": \"Postman\",\r

    \   \"clientEmail\": \"{{email}}\"\r

    }"
scripts:
  - type: afterResponse
    code: "//
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Config\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      const MAX_RESPONSE_TIME_MS = 500;\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // HTTP Validation\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Status code is 409', () => {\r

      \    pm.response.to.have.status(409);\r

      });\r

      \r

      pm.test('Response time satisfactory', () => {\r

      \    pm.expect(pm.response.responseTime, 'Response too slow')\r

      \        .to.be.below(MAX_RESPONSE_TIME_MS);\r

      });\r

      \r

      pm.test('Content-Type is JSON', () => {\r

      \    const contentType = pm.response.headers.get('Content-Type');\r

      \    \r

      \    pm.expect(contentType, 'Missing Content-Type header').to.exist;\r

      \    pm.expect(contentType.toLowerCase(), 'Content-Type must include
      application/json')\r

      \        .to.include('application/json');\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Parse Response\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      let response;\r

      \r

      pm.test('Response is valid JSON', () => {\r

      \    pm.expect(pm.response.text(), 'Response body must not be empty')\r

      \        .to.not.be.empty;\r

      \    \r

      \    response = pm.response.json();\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Schema Validation\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Schema is valid', () => {\r

      \r

      \    const schema = {\r

      \        type: 'object',\r

      \        properties: {\r

      \            error: {\r

      \                type: 'string',\r

      \                pattern: '^[A-Za-z0-9-_. ]+$'\r

      \            }\r

      \        },\r

      \        required: ['error'],\r

      \        additionalProperties: false\r

      \    };\r

      \r

      \    pm.response.to.have.jsonSchema(schema);\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Response Body Validation\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Request body is not empty', () => {\r

      \    pm.expect(response, 'Response must not be null')\r

      \        .to.not.be.null\r

      });\r\n"
    language: text/javascript
order: 13000
