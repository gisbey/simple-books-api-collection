$kind: http-request
name: List Books
description: "Documentation can be found in the simple-books-api-collection
  repo's README.md file:
  [https://github.com/gisbey/simple-books-api-collection/blob/main/README.md#ge\
  t-books--list-books](https://github.com/gisbey/simple-books-api-collection/bl\
  ob/main/README.md#get-books--list-books)"
url: "{{baseUrl}}/books"
method: GET
queryParams:
  - key: type
    value: non-fiction
    disabled: true
scripts:
  - type: afterResponse
    code: "//
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Config\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      const MAX_RESPONSE_TIME_MS = 500;\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // HTTP Validation\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Status code is 200', () => {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test('Response time satisfactory', () => {\r

      \    pm.expect(pm.response.responseTime, 'Response too slow')\r

      \        .to.be.below(MAX_RESPONSE_TIME_MS);\r

      });\r

      \r

      pm.test('Content-Type is JSON', () => {\r

      \    const contentType = pm.response.headers.get('Content-Type');\r

      \    \r

      \    pm.expect(contentType, 'Missing Content-Type header').to.exist;\r

      \    pm.expect(contentType.toLowerCase(), 'Content-Type must include
      application/json')\r

      \        .to.include('application/json');\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Parse Response\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      let response;\r

      \r

      pm.test('Response is valid JSON', () => {\r

      \    pm.expect(pm.response.text(), 'Response body must not be empty')\r

      \        .to.not.be.empty;\r

      \    \r

      \    response = pm.response.json();\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Schema Validation\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Schema is valid', () => {\r

      \r

      \    const schema = {\r

      \        type: 'array',\r

      \        items: {\r

      \            type: 'object',\r

      \            properties: {\r

      \                id: {\r

      \                    type: 'integer'\r

      \                },\r

      \                name: {\r

      \                    type: 'string',\r

      \                    pattern: '^[A-Za-z ]+$'\r

      \                },\r

      \                type: {\r

      \                    type: 'string',\r

      \                    pattern: '^[a-z-]+$'\r

      \                },\r

      \                available: {\r

      \                    type: 'boolean'\r

      \                }\r

      \            },\r

      \            required: ['id', 'name', 'type', 'available'],\r

      \            additionalProperties: false\r

      \        }\r

      \    };\r

      \r

      \    pm.response.to.have.jsonSchema(schema);\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Random Avilable Fiction Book Selection\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      // Filter for available fiction books\r

      const availableFictionBook = response.filter((book) => \r

      \    book.type === \"fiction\" && \r

      \    book.available === true);\r

      \r

      //Select random fiction book from the filtered list\r

      const book = availableFictionBook\r

      \    [Math.floor(Math.random() * availableFictionBook.length)];\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Business Logic Tests\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test(\"Random available fiction book valid\", () => {\r

      \    pm.expect(book, 'Book must be an object')\r

      \        .to.be.an('object');\r

      \    \r

      \    pm.expect(book.type, 'Book Type must be fiction')\r

      \        .to.eql(\"fiction\");\r

      \    \r

      \    pm.expect(book.available, 'Book must be available')\r

      \        .to.eql(true);\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Export Variables\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      if (book) {\r

      \    pm.collectionVariables.set(\"bookId\", book.id);\r

      \    pm.collectionVariables.set(\"bookName\", book.name);\r

      }\r\n"
    language: text/javascript
order: 3000
